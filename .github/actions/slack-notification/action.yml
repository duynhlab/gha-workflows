name: Slack Notification
description: |
  Send CI/CD status notification with thread support.
  - If thread_ts provided: reply in that thread (PR flow)
  - If thread_ts empty: send standalone message (push to main flow)
  - If update_ts provided: update existing message instead of sending new one

inputs:
  channel_id:
    required: true
    description: 'Slack channel ID to send notification to'
  status:
    required: true
    description: 'CI status: success, failed, cancelled'
  thread_ts:
    required: false
    description: 'Slack thread timestamp to reply to (from pr-checks output). If empty, sends standalone message.'
    default: ''
  update_ts:
    required: false
    description: 'Slack message timestamp to update. If empty, sends new message.'
    default: ''
  reply_broadcast:
    required: false
    description: 'Whether reply should be broadcast to the channel.'
    default: 'false'
  slack_bot_token:
    required: true
    description: 'Slack bot token for authentication'

outputs:
  ts:
    description: 'Timestamp of sent message'
    value: ${{ steps.slack-standalone.outputs.ts || steps.slack-reply.outputs.ts }}
  thread_ts:
    description: 'Thread timestamp for chaining replies'
    value: ${{ steps.slack-standalone.outputs.thread_ts || steps.slack-reply.outputs.thread_ts }}

runs:
  using: composite
  steps:
    # If thread_ts is empty (push to main): send standalone CI status message
    - name: Send standalone CI status
      id: slack-standalone
      if: inputs.thread_ts == ''
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.${{ inputs.update_ts && 'update' || 'postMessage' }}
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ inputs.channel_id }}",
            ${{ inputs.update_ts && format('"ts": "{0}",', inputs.update_ts) || '' }}
            "text": "CI for `${{ github.repository }}` - ${{ inputs.status }}",
            "attachments": [
              {
                "color": "${{ inputs.status == 'success' && 'good' || (inputs.status == 'failed' && 'danger' || 'warning') }}",
                "fields": [
                  {
                    "title": "Status",
                    "short": true,
                    "value": "`${{ inputs.status }}`"
                  },
                  {
                    "title": "Branch",
                    "short": true,
                    "value": "`${{ github.ref_name }}`"
                  },
                  {
                    "title": "Author",
                    "short": true,
                    "value": "${{ github.actor }}"
                  },
                  {
                    "title": "Build",
                    "short": true,
                    "value": "#${{ github.run_number }}"
                  },
                  {
                    "title": "Commit",
                    "short": true,
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
                  },
                  {
                    "title": "Workflow",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                ]
              }
            ],
            "link_names": true,
            "mrkdwn": true
          }

    # If thread_ts is provided (PR flow): reply in thread
    - name: Reply CI status in thread
      id: slack-reply
      if: inputs.thread_ts != ''
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ inputs.channel_id }}",
            "text": "Status: `${{ inputs.status }}` | Build #${{ github.run_number }} [<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Logs>]",
            "thread_ts": "${{ inputs.thread_ts }}",
            "reply_broadcast": ${{ inputs.reply_broadcast }},
            "link_names": true,
            "mrkdwn": true
          }
