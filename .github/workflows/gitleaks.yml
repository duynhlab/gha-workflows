name: Gitleaks Secret Scan

# Reusable workflow: scans source code and git history for leaked secrets.
# Uses gitleaks CLI binary (MIT, open-source) via a composite action.

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      config-path:
        description: 'Path to custom .gitleaks.toml config'
        required: false
        type: string
        default: ''
      gitleaks-version:
        description: 'Gitleaks CLI version to use'
        required: false
        type: string
        default: '8.21.2'
      scan-mode:
        description: 'Scan mode: "auto" (PR=diff, push=full), "full", or "diff"'
        required: false
        type: string
        default: 'auto'
    outputs:
      exit-code:
        description: 'Gitleaks exit code (0=clean, 1=leaks)'
        value: ${{ jobs.gitleaks.outputs.exit-code }}
      sarif:
        description: 'Path to SARIF report'
        value: ${{ jobs.gitleaks.outputs.sarif }}
      summary:
        description: 'Number of findings'
        value: ${{ jobs.gitleaks.outputs.summary }}

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      security-events: write

    outputs:
      exit-code: ${{ steps.gitleaks.outputs.exit-code }}
      sarif: ${{ steps.gitleaks.outputs.sarif }}
      summary: ${{ steps.gitleaks.outputs.summary }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: duynhlab/gha-workflows/.github/actions/gitleaks@main
        with:
          version: ${{ inputs.gitleaks-version }}
          config-path: ${{ inputs.config-path }}
          scan-mode: ${{ inputs.scan-mode }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ steps.gitleaks.outputs.sarif }}
        continue-on-error: true
