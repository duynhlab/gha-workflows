name: SonarCloud Analysis

on:
  workflow_call:
    inputs:
      project-key:
        description: 'SonarCloud project key (e.g., org_project-name)'
        required: true
        type: string
      organization:
        description: 'SonarCloud organization'
        required: true
        type: string
      sources:
        description: 'Comma-separated paths to source directories'
        required: false
        type: string
        default: '.'
      exclusions:
        description: 'Comma-separated patterns to exclude'
        required: false
        type: string
        default: '**/vendor/**,**/node_modules/**,**/*_test.go,**/testdata/**'
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.25'
      coverage-path:
        description: 'Path to Go coverage file'
        required: false
        type: string
        default: 'coverage.out'
      artifact-name:
        description: 'Name of the artifact containing coverage report'
        required: false
        type: string
        default: 'coverage-report'
      coverage-exclusions:
        description: 'Paths excluded from the coverage % only (still analyzed for bugs/smells): bootstrap/wiring/migrations/mocks.'
        required: false
        type: string
        default: '**/cmd/**,**/internal/core/database.go,**/db/migrations/**,**/mocks/**,**/*_mock.go'
      integration-coverage:
        description: 'Merge integration coverage (coverage-integration.out from go-check.yml integration job) into the SonarCloud report.'
        required: false
        type: boolean
        default: false
      runs-on:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      quality-gate-wait:
        description: 'Wait for Quality Gate result'
        required: false
        type: boolean
        default: true
      quality-gate-timeout:
        description: 'Quality Gate polling timeout in seconds'
        required: false
        type: number
        default: 300
      fail-on-quality-gate:
        description: 'Fail the job if Quality Gate fails'
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: 'SonarCloud authentication token'
        required: false

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # Full history for proper blame information

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag: v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Download integration coverage report
        if: inputs.integration-coverage
        continue-on-error: true # absent if the integration job was skipped/failed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag: v8.0.1
        with:
          name: coverage-integration-report
          path: .

      - name: Resolve coverage report paths
        id: cov
        run: |
          paths="${{ inputs.coverage-path }}"
          if [ -f coverage-integration.out ]; then
            paths="${paths},coverage-integration.out"
          fi
          echo "paths=${paths}" >> "$GITHUB_OUTPUT"
          echo "coverage reportPaths: ${paths}"

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # tag: v8.2.1
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.project-key }}
            -Dsonar.organization=${{ inputs.organization }}
            -Dsonar.sources=${{ inputs.sources }}
            -Dsonar.exclusions=${{ inputs.exclusions }}
            -Dsonar.coverage.exclusions=${{ inputs.coverage-exclusions }}
            -Dsonar.go.coverage.reportPaths=${{ steps.cov.outputs.paths }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        id: qg
        if: inputs.quality-gate-wait
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # tag: v1.2.0
        continue-on-error: ${{ !inputs.fail-on-quality-gate }}
        with:
          pollingTimeoutSec: ${{ inputs.quality-gate-timeout }}
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Status
        if: always()
        run: |
          GATE="${{ steps.qg.outputs.quality-gate-status || 'not evaluated' }}"
          case "$GATE" in
            PASSED|OK) GATE_DISPLAY="✅ PASSED" ;;
            FAILED|ERROR) GATE_DISPLAY="❌ FAILED" ;;
            *) GATE_DISPLAY="$GATE" ;;
          esac
          echo "## 🔍 SonarCloud Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | **${GATE_DISPLAY}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Enforced (fail-on-gate) | \`${{ inputs.fail-on-quality-gate }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Project Key | \`${{ inputs.project-key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Organization | \`${{ inputs.organization }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | [View on SonarCloud](https://sonarcloud.io/project/overview?id=${{ inputs.project-key }}) |" >> $GITHUB_STEP_SUMMARY
