name: PR Checks

on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        required: false
        type: string
      slack_channel_id:
        description: |
          Slack channel ID to post PR notifications (e.g. C0AD82A9A74).
        required: true
        type: string
    outputs:
      slack_thread_ts:
        description: 'Slack thread timestamp for reply threading and message update'
        value: ${{ jobs.notify-pr-events.outputs.thread_ts }}
    secrets:
      SLACK_BOT_TOKEN:
        description: |
          The slack bot token to authorize with slack.
        required: true

jobs:
  validate-pr:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
    runs-on: ${{ inputs.runs-on }}
    steps:
    - name: Validate Source Branch
      env:
        HEAD_REF: ${{ github.head_ref }}
      run: |
        # Allow standard gitflow/trunk-based prefixes.
        # HEAD_REF is passed via env (not interpolated into the script) to avoid
        # shell injection from an attacker-controlled branch name.
        if [[ ! "$HEAD_REF" =~ ^(feature|feat|fix|bugfix|hotfix|release|chore|docs|refactor|test|perf|dependabot|ci|renovate|build)\/ ]]; then
          echo "Error: Source branch '$HEAD_REF' does not match allowed patterns (feat/*, fix/*, test/*, chore/*, etc.)"
          echo "Create a new branch with a valid prefix and open a new PR."
          exit 1
        fi

  notify-pr-events:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      thread_ts: ${{ steps.slack-notify.outputs.ts }}
    steps:
      - name: Checkout CODEOWNERS file
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/CODEOWNERS
            CODEOWNERS
            docs/CODEOWNERS

      - name: Get CODEOWNERS
        id: codeowners
        run: |
          # GitHub precedence: .github/ → root → docs/
          for f in .github/CODEOWNERS CODEOWNERS docs/CODEOWNERS; do
            if [ -f "$f" ]; then
              CODEOWNERS_FILE="$f"
              break
            fi
          done

          if [ -n "${CODEOWNERS_FILE:-}" ]; then
            owners="$(awk '$1=="*" { for(i=2;i<=NF;i++){if($i~/^#/)break; printf "%s ",$i}; exit }' "$CODEOWNERS_FILE" | sed 's/ $//')"
            echo "owners=${owners}" >> "$GITHUB_ENV"
          else
            echo "owners=" >> "$GITHUB_ENV"
          fi

      ## Notify the PR details to codeowners on slack
      - name: Notify PR Event
        id: slack-notify
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ inputs.slack_channel_id }}",
              "text": "PULL_REQUEST <${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}> ${{ github.event.action }} in <${{ github.event.repository.html_url}}|${{ github.repository }}> by ${{ github.event.pull_request.user.login }}${{ env.owners != '' && format(' cc {0}', env.owners) || '' }}"
            }
