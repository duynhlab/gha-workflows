name: Docker Build & Push (Node)

# Reusable workflow: builds a Node.js service Docker image, scans for vulnerabilities,
# and pushes to GHCR only if the scan passes.
#
# Security: When scan-before-push is enabled (default), the image is built locally
# (--load), scanned with Trivy, and only pushed if no vulnerabilities are found.
# This prevents vulnerable images from reaching the registry.

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the Docker image (without registry prefix)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: false
      platforms:
        description: 'Target platforms for build (e.g., linux/amd64,linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64'
      build-args:
        description: 'List of build-time variables'
        required: false
        type: string
        default: ''
      tags:
        description: 'Custom tags (comma-separated). If empty, uses default tagging'
        required: false
        type: string
        default: ''
      runs-on:
        description: 'Runner type'
        required: false
        type: string
        default: 'ubuntu-latest'
      sbom:
        description: 'Generate SBOM attestation'
        required: false
        type: boolean
        default: false
      scan-before-push:
        description: 'Scan image with Trivy before pushing to registry'
        required: false
        type: boolean
        default: true
      scan-severity:
        description: 'Severities to scan for and REPORT in the summary (e.g. CRITICAL,HIGH)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      scan-block-severity:
        description: 'Severities that BLOCK the push. The rest are report-only. Default: only CRITICAL blocks; HIGH is reported but does not block (avoids being stuck on base-image HIGH CVEs with no upstream fix yet).'
        required: false
        type: string
        default: 'CRITICAL'
      scan-exit-code:
        description: 'DEPRECATED / no longer gates the push — superseded by scan-block-severity. Kept for backward compatibility.'
        required: false
        type: string
        default: '1'
      scan-ignore-unfixed:
        description: 'Ignore vulnerabilities without a fix available'
        required: false
        type: boolean
        default: true
      scan-trivyignores:
        description: 'Path to .trivyignore file (relative to build context) for suppressing known upstream CVEs'
        required: false
        type: string
        default: ''

    outputs:
      tags:
        description: 'Generated image tags (newline-separated)'
        value: ${{ jobs.build.outputs.tags }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
      scan-status:
        description: 'Pre-push scan result: pass, fail, or skipped'
        value: ${{ jobs.build.outputs.scan-status }}

jobs:
  build:
    name: Build & Push
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      packages: write
      actions: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
      scan-status: ${{ steps.scan-result.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            ${{ inputs.tags }}

      # ── Build locally for scanning (--load, single platform) ──
      - name: Build image (local)
        id: build-local
        if: inputs.push && inputs.scan-before-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-main
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }}
          provenance: false

      # ── Trivy scan (local image, before push) → JSON for parsing ──
      - name: Trivy pre-push scan
        id: trivy
        if: inputs.push && inputs.scan-before-push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'json'
          output: 'trivy-results.json'
          severity: ${{ inputs.scan-severity }}
          exit-code: '0' # never fail here; we gate ourselves on scan-block-severity below
          ignore-unfixed: ${{ inputs.scan-ignore-unfixed }}
          trivyignores: ${{ inputs.scan-trivyignores }}
          scanners: 'vuln'

      # ── Parse findings, write the job summary, decide the push gate ──
      # Policy: block the push only on scan-block-severity (default CRITICAL); other
      # reported severities (e.g. HIGH) are surfaced but do NOT block.
      - name: Evaluate scan & write summary
        id: scan-result
        if: always()
        run: |
          if [ "${{ inputs.scan-before-push }}" != "true" ] || [ "${{ inputs.push }}" != "true" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CRITICAL=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json 2>/dev/null || echo 0)
          LOW=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json 2>/dev/null || echo 0)

          # Sum findings whose severity is in scan-block-severity → these block the push.
          BLOCK=0
          IFS=',' read -ra SEV <<< "${{ inputs.scan-block-severity }}"
          for s in "${SEV[@]}"; do
            case "$(echo "$s" | xargs)" in
              CRITICAL) BLOCK=$((BLOCK + CRITICAL)) ;;
              HIGH)     BLOCK=$((BLOCK + HIGH)) ;;
              MEDIUM)   BLOCK=$((BLOCK + MEDIUM)) ;;
              LOW)      BLOCK=$((BLOCK + LOW)) ;;
            esac
          done

          if [ "$BLOCK" -gt 0 ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "## Pre-push Trivy Scan"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| CRITICAL | ${CRITICAL} |"
            echo "| HIGH | ${HIGH} |"
            echo "| MEDIUM | ${MEDIUM} |"
            echo "| LOW | ${LOW} |"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Image | \`${{ inputs.image-name }}\` |"
            echo "| Report severity | \`${{ inputs.scan-severity }}\` |"
            echo "| Block severity | \`${{ inputs.scan-block-severity }}\` |"
            echo "| Ignore unfixed | \`${{ inputs.scan-ignore-unfixed }}\` |"
            if [ "$BLOCK" -gt 0 ]; then
              echo "| Result | **BLOCKED** — ${BLOCK} finding(s) at block severity; image NOT pushed |"
            else
              echo "| Result | **PASS** — push allowed (other findings reported below, not blocking) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          VULN_LIST=$(jq -r '.Results[]? | .Vulnerabilities[]? | "| \(.VulnerabilityID) | \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' trivy-results.json 2>/dev/null || true)
          if [ -n "$VULN_LIST" ]; then
            {
              echo ""
              echo "<details><summary>Findings (${CRITICAL} critical, ${HIGH} high)</summary>"
              echo ""
              echo "| CVE | Severity | Package | Installed | Fixed |"
              echo "|-----|----------|---------|-----------|-------|"
              echo "$VULN_LIST"
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$HIGH" -gt 0 ] && [ "$BLOCK" -eq 0 ]; then
            echo "::warning::Trivy reported ${HIGH} HIGH vulnerability(ies) (report-only, not blocking the push). See the job summary."
          fi

      # ── Push to registry (only if scan passed or scanning disabled) ──
      - name: Push image to registry
        id: push
        if: >-
          inputs.push && (
            !inputs.scan-before-push ||
            steps.scan-result.outputs.status == 'pass'
          )
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-main
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }},mode=max
          provenance: true
          sbom: ${{ inputs.sbom }}

      # ── Build without scan (when scan-before-push is false) ──
      - name: Build and push (no pre-scan)
        id: build-no-scan
        if: inputs.push && !inputs.scan-before-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-main
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }},mode=max
          provenance: true
          sbom: ${{ inputs.sbom }}

      # ── Build only (no push) ──
      - name: Build image (no push)
        id: build-only
        if: '!inputs.push && !inputs.scan-before-push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-main
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:cache-${{ github.ref_name }}
          provenance: false

      - name: Generate build summary
        if: always()
        run: |
          DIGEST="${{ steps.push.outputs.digest || steps.build-no-scan.outputs.digest || 'N/A (not pushed)' }}"
          PUSHED="false"
          if [ -n "${{ steps.push.outputs.digest }}" ] || [ -n "${{ steps.build-no-scan.outputs.digest }}" ]; then
            PUSHED="true"
          fi

          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ inputs.image-name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushed | ${PUSHED} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-push Scan | **${{ steps.scan-result.outputs.status }}** |" >> $GITHUB_STEP_SUMMARY

      # ── Fail job if scan failed (ensures the job status reflects the scan) ──
      - name: Fail on blocking vulnerabilities
        if: always() && steps.scan-result.outputs.status == 'fail'
        run: |
          echo "::error::Pre-push Trivy scan found vulnerabilities at block severity (${{ inputs.scan-block-severity }}). Image was NOT pushed to registry."
          exit 1
