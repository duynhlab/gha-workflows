name: Go Check

on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        required: false
        type: string
      command-test:
        required: true
        type: string
      setup-go:
        required: false
        type: boolean
        default: true
        description: Indicate whether should install go or not. Default is true
      gomod-path:
        required: false
        type: string
        default: "go.mod"
        description: Indicate the path of go.mod file. Default is go.mod
      lint:
        required: false
        type: boolean
        default: false
        description: Indicate whether should run golint or not. Default is false
      lint-path:
        required: false
        type: string
        default: ".golangci.yml"
        description: Indicate the path of lint config file. Default is .golangci.yml
      lint-timeout:
        required: false
        type: string
        default: 10m
        description: Indicate the timeout of golangci-lint. Default is 10 minutes
      lint-version:
        required: false
        type: string
        default: "v2.6.0"
        description: golangci-lint version (e.g. v2.6.0). Uses go install for act/Go version compatibility.
      test-stable:
        required: false
        type: boolean
        default: false
        description: Also test against stable Go version (non-blocking, for compatibility check)
      integration:
        required: false
        type: boolean
        default: false
        description: Run integration tests (go test -tags=integration). Needs a Docker daemon (testcontainers); ubuntu-latest has one.
      integration-command:
        required: false
        type: string
        default: 'go test -tags=integration -covermode=atomic -coverprofile=coverage-integration.out ./...'
        description: Command for the integration job. Must write coverage-integration.out (merged into SonarCloud coverage).


jobs:
  test:
    name: Test
    timeout-minutes: 60
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: ${{ inputs.setup-go }}
        with:
          go-version-file: ${{ inputs.gomod-path }}

      - name: Show Go version
        run: go version

      - name: Unit Test
        run: ${{ inputs.command-test }}

      - name: Archive code coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 1

  integration:
    name: Integration Test
    if: ${{ inputs.integration }}
    timeout-minutes: 30
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: ${{ inputs.setup-go }}
        with:
          go-version-file: ${{ inputs.gomod-path }}

      # ubuntu-latest ships a running Docker daemon, so testcontainers works.
      - name: Integration Test
        # Disable the testcontainers Ryuk reaper on CI: the runner is ephemeral
        # (no orphans to clean), and Ryuk's connect step intermittently hangs on
        # GitHub runners — which timed out the whole job. Containers are still
        # torn down by each test's t.Cleanup.
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ${{ inputs.integration-command }}

      - name: Archive integration coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success()
        with:
          name: coverage-integration-report
          path: coverage-integration.out
          retention-days: 1

  test-stable:
    name: Test (stable)
    if: ${{ inputs.test-stable }}
    timeout-minutes: 60
    runs-on: ${{ inputs.runs-on }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go (stable)
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: ${{ inputs.setup-go }}
        with:
          go-version: 'stable'

      - name: Show Go version
        run: go version

      - name: Unit Test
        run: ${{ inputs.command-test }}

  # Run lint
  lint:
    name: Lint
    timeout-minutes: 30
    runs-on: ${{ inputs.runs-on }}
    if: github.event_name == 'pull_request' && inputs.lint
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ inputs.gomod-path }}
          cache: false

      # fix typecheck fails https://github.com/golangci/golangci-lint-action/issues/902
      - name: Download dependencies
        run: |
          go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ inputs.lint-version }}

      - name: Lint check
        run: golangci-lint run --timeout="${{ inputs.lint-timeout }}" --config="${{ inputs.lint-path }}"