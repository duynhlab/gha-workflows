name: Lint (Terraform)

on:
  workflow_call:
    inputs:
      tflint_config_path:
        required: false
        type: string
      tflint_minimum_failure_severity:
        required: false
        type: string
        default: warning
      tflint_force:
        required: false
        type: boolean
        default: false

# TODO: Add job for `terraform validate`
jobs:
  terraform-fmt:
      name: terraform fmt
      runs-on: ubuntu-latest

      permissions:
        contents: read

      steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: terraform fmt
        run: terraform fmt -no-color -check -diff -recursive
  tflint:
      name: TFLint
      runs-on: ubuntu-latest

      permissions:
        contents: read

      steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache plugin dir
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}

      - name: Set config path
        if: inputs.tflint_config_path != ''
        run: echo "TFLINT_CONFIG_FILE=${{ inputs.tflint_config_path }}" >> $GITHUB_ENV

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        env:
          MIN_FAILURE_SEVERITY: --minimum-failure-severity=${{ inputs.tflint_minimum_failure_severity }}
          FORCE: ${{ inputs.tflint_force && '--force' || '' }}
        run: tflint -f compact --recursive $MIN_FAILURE_SEVERITY $FORCE
