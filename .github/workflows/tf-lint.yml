name: Lint (Terraform)

on:
  workflow_call:
    inputs:
      tflint_config_path:
        required: false
        type: string
      tflint_minimum_failure_severity:
        required: false
        type: string
        default: warning
      tflint_force:
        required: false
        type: boolean
        default: false

# TODO: Add job for `terraform validate`
jobs:
  terraform-fmt:
      name: terraform fmt
      runs-on: ubuntu-latest

      permissions:
        contents: read

      steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: terraform fmt
        run: terraform fmt -no-color -check -diff -recursive
  tflint:
      name: TFLint
      runs-on: ubuntu-latest

      permissions:
        contents: read

      steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Cache plugin dir
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}

      - name: Set config path
        if: inputs.tflint_config_path != ''
        run: echo "TFLINT_CONFIG_FILE=${{ inputs.tflint_config_path }}" >> $GITHUB_ENV

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: Show version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        env:
          MIN_FAILURE_SEVERITY: --minimum-failure-severity=${{ inputs.tflint_minimum_failure_severity }}
          FORCE: ${{ inputs.tflint_force && '--force' || '' }}
        run: tflint -f compact --recursive $MIN_FAILURE_SEVERITY $FORCE
